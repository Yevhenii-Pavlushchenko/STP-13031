<article class="faq_section" id="faq">
  <div class="header-bg">
    <div class="container">
      <h2 class="section-title">FAQ</h2>
    </div>
  </div>

  <div class="container">
    <h3 class="section_subtitle">QUICK ANSWERS</h3>

    <div class="faq_container">
      <div class="faq_item" data-faq-item>
        <button class="faq_trigger" data-faq-trigger aria-expanded="false">
          <span class="faq_question"
            >Is Abyssal Tide: Lost Oceans exploration-focused?</span
          >
          <span class="faq_icon-box">
            <svg class="faq_icon" width="16" height="10">
              <use href="/sprite.svg#icon-faq"></use>
            </svg>
          </span>
        </button>
        <div class="faq_content" data-faq-content>
          <div class="faq_text-wrap">
            <p class="faq_answer">
              Yes, exploration and discovery are central gameplay elements.
            </p>
          </div>
        </div>
      </div>

      <div class="faq_item" data-faq-item>
        <button class="faq_trigger" data-faq-trigger aria-expanded="false">
          <span class="faq_question"
            >Does the game include survival mechanics?</span
          >
          <span class="faq_icon-box">
            <svg class="faq_icon" width="16" height="10">
              <use href="/sprite.svg#icon-faq"></use>
            </svg>
          </span>
        </button>
        <div class="faq_content" data-faq-content>
          <div class="faq_text-wrap">
            <p class="faq_answer">
              Yes, players manage oxygen, resources, and equipment systems.
            </p>
          </div>
        </div>
      </div>

      <div class="faq_item" data-faq-item>
        <button class="faq_trigger" data-faq-trigger aria-expanded="false">
          <span class="faq_question">Can players build underwater bases?</span>
          <span class="faq_icon-box">
            <svg class="faq_icon" width="16" height="10">
              <use href="/sprite.svg#icon-faq"></use>
            </svg>
          </span>
        </button>
        <div class="faq_content" data-faq-content>
          <div class="faq_text-wrap">
            <p class="faq_answer">
              Yes, base construction and upgrades are major progression
              features.
            </p>
          </div>
        </div>
      </div>

      <div class="faq_item" data-faq-item>
        <button class="faq_trigger" data-faq-trigger aria-expanded="false">
          <span class="faq_question">Are there dangerous sea creatures?</span>
          <span class="faq_icon-box">
            <svg class="faq_icon" width="16" height="10">
              <use href="/sprite.svg#icon-faq"></use>
            </svg>
          </span>
        </button>
        <div class="faq_content" data-faq-content>
          <div class="faq_text-wrap">
            <p class="faq_answer">
              Yes, players encounter various underwater threats during
              exploration.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</article>
